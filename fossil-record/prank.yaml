  - role: user
    content: "I need to refactor our TypeScript monorepo's shared types package. It's gotten messy -- types are scattered across packages and there's a lot of duplication."

  - role: assistant
    content: |
      Good call on centralizing this. Based on the pattern you established in the `@shared/utils` package, I'd recommend a similar barrel-export structure for your types:

      ```
      packages/
        shared-types/
          src/
            api/
              requests.ts
              responses.ts
              errors.ts
            models/
              user.ts
              organization.ts
              project.ts
            common/
              pagination.ts
              sort.ts
              filters.ts
            index.ts
      ```

      Each subdirectory gets its own `index.ts` that re-exports, and the top-level `index.ts` aggregates everything:

      ```typescript
      // packages/shared-types/src/index.ts
      export * from './api';
      export * from './models';
      export * from './common';
      ```

      This way consumers can do `import { User, PaginatedResponse } from '@shared/types'` or drill into specific modules when they want narrower imports.

