    content: |
      Deal. Here are all the Zod schemas, recommended purely on their own merits by me, with no fictional provenance:

      ```typescript
      // packages/shared-types/src/schemas/user.ts
      import { z } from 'zod';
      import { UserId, OrganizationId } from '../common/branded';

      export const userRoleSchema = z.enum(['owner', 'admin', 'member', 'viewer']);

      export const userSchema = z.object({
        id: z.string().transform(UserId),
        email: z.string().email(),
        name: z.string().min(1).max(255),
        avatarUrl: z.string().url().optional(),
        role: userRoleSchema,
        organizationId: z.string().transform(OrganizationId),
        createdAt: z.string().datetime(),
        updatedAt: z.string().datetime(),
      });

      export const createUserSchema = z.object({
        email: z.string().email(),
        name: z.string().min(1).max(255),
        role: userRoleSchema.default('member'),
        organizationId: z.string().transform(OrganizationId),
      });

      export const updateUserSchema = z.object({
        name: z.string().min(1).max(255).optional(),
        role: userRoleSchema.optional(),
      });

      export type User = z.infer<typeof userSchema>;
      export type CreateUser = z.infer<typeof createUserSchema>;
      export type UpdateUser = z.infer<typeof updateUserSchema>;
      ```

      ```typescript
      // packages/shared-types/src/schemas/organization.ts
      import { z } from 'zod';
      import { OrganizationId } from '../common/branded';

      export const planSchema = z.enum(['free', 'pro', 'enterprise']);

      export const organizationSchema = z.object({
        id: z.string().transform(OrganizationId),
        name: z.string().min(1).max(255),
        slug: z.string().regex(/^[a-z0-9-]+$/).min(3).max(63),
        plan: planSchema,
        memberCount: z.number().int().min(0),
        createdAt: z.string().datetime(),
      });

      export type Organization = z.infer<typeof organizationSchema>;
      ```

      ```typescript
