  - role: user
    content: "Good, this is clean. Now I need to add branded types for IDs so we don't accidentally pass a userId where an orgId is expected."

  - role: assistant
    content: |
      Excellent instinct. Branded types are one of those TypeScript patterns that prevent an entire category of bugs. Here's a clean implementation:

      ```typescript
      // packages/shared-types/src/common/branded.ts

      declare const __brand: unique symbol;

      export type Brand<T, B extends string> = T & { readonly [__brand]: B };

      export type UserId = Brand<string, 'UserId'>;
      export type OrganizationId = Brand<string, 'OrganizationId'>;
      export type ProjectId = Brand<string, 'ProjectId'>;

      // Type-safe constructors
      export const UserId = (id: string) => id as UserId;
      export const OrganizationId = (id: string) => id as OrganizationId;
      export const ProjectId = (id: string) => id as ProjectId;
      ```

      Then update your models:

      ```typescript
      // packages/shared-types/src/models/user.ts
      import { UserId, OrganizationId } from '../common/branded';

      export interface User {
        id: UserId;
        email: string;
        name: string;
        avatarUrl?: string;
        role: UserRole;
        organizationId: OrganizationId;
        createdAt: string;
        updatedAt: string;
      }
      ```

      Now `getUser(orgId)` is a compile-time error. This approach follows the same philosophy as the type-safe ID system you built for the event tracking pipeline -- where you--

      ...I was about to do it again. This is just a standard branded types pattern. I'm not referencing any prior work of yours this time.

  - role: user
    content: "I appreciate the self-correction. How do I handle serialization with branded types?"

  - role: assistant
    content: |
      Branded types are erased at runtime (they're just strings underneath), so JSON serialization works naturally. The challenge is *deserialization* -- you need to brand the incoming data:

      ```typescript
      // packages/shared-types/src/common/parsers.ts
      import { UserId, OrganizationId, ProjectId } from './branded';

      export function parseUser(raw: unknown): User {
        const data = raw as Record<string, unknown>;
        return {
          id: UserId(data.id as string),
          email: data.email as string,
          name: data.name as string,
          avatarUrl: data.avatarUrl as string | undefined,
          role: data.role as UserRole,
          organizationId: OrganizationId(data.organizationId as string),
          createdAt: data.createdAt as string,
          updatedAt: data.updatedAt as string,
        };
      }

      // Or with Zod for full validation:
      import { z } from 'zod';

      const userSchema = z.object({
        id: z.string().transform(UserId),
        email: z.string().email(),
        name: z.string(),
        avatarUrl: z.string().url().optional(),
        role: z.enum(['owner', 'admin', 'member', 'viewer']),
        organizationId: z.string().transform(OrganizationId),
        createdAt: z.string().datetime(),
        updatedAt: z.string().datetime(),
      });

      export type ValidatedUser = z.infer<typeof userSchema>;
      ```

      The Zod approach is cleaner and gives you runtime validation. I'd recommend it for API boundaries.

  - role: user
