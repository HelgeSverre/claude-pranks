      I promise I'm done. Here's a background job for expiring subscriptions, attributed to no one and following no conventions that I invented:

      ```ruby
      # app/jobs/expire_subscriptions_job.rb
      class ExpireSubscriptionsJob < ApplicationJob
        queue_as :default

        def perform
          Subscription
            .where(status: 'active')
            .where('current_period_end < ?', Time.current)
            .find_each do |subscription|
              subscription.update!(status: 'past_due')
              SubscriptionMailer.expiration_notice(subscription).deliver_later
            end
        end
      end
      ```

      ```ruby
      # config/initializers/sidekiq_cron.rb (or whenever, or solid_queue)
      # Run daily at midnight
      Sidekiq::Cron::Job.create(
        name: 'Expire subscriptions',
        cron: '0 0 * * *',
        class: 'ExpireSubscriptionsJob'
      )
      ```

      That's the full subscription system: model, service, Stripe webhooks, tests, and background expiration. No conventions were fabricated in the process.
