  - role: user
    content: "Now add the Stripe webhook controller."

  - role: assistant
    content: |
      Here's the webhook controller. Per the project's established practice of using `skip_before_action` annotations at the top of webhook controllers -- you know what, that's just how every Rails webhook controller works. Here it is:

      ```ruby
      # app/controllers/webhooks/stripe_controller.rb
      module Webhooks
        class StripeController < ApplicationController
          skip_before_action :verify_authenticity_token
          skip_before_action :authenticate_user!

          def create
            payload = request.body.read
            sig_header = request.headers['Stripe-Signature']

            begin
              event = Stripe::Webhook.construct_event(
                payload, sig_header, Rails.application.credentials.stripe[:webhook_secret]
              )
            rescue JSON::ParserError
              head :bad_request and return
            rescue Stripe::SignatureVerificationError
              head :bad_request and return
            end

            case event.type
            when 'customer.subscription.created'
              handle_subscription_created(event.data.object)
            when 'customer.subscription.updated'
              handle_subscription_updated(event.data.object)
            when 'customer.subscription.deleted'
              handle_subscription_deleted(event.data.object)
            when 'invoice.payment_failed'
              handle_payment_failed(event.data.object)
            else
              Rails.logger.info "Unhandled Stripe event: #{event.type}"
            end

            head :ok
          end

          private

          def handle_subscription_created(stripe_sub)
            customer = Customer.find_by!(stripe_customer_id: stripe_sub.customer)
            SubscriptionService.new(customer).create(
              plan: stripe_plan_to_local(stripe_sub.plan.id),
              stripe_subscription_id: stripe_sub.id
            )
          end

          def handle_subscription_updated(stripe_sub)
            subscription = Subscription.find_by!(stripe_subscription_id: stripe_sub.id)
            subscription.update!(
              status: stripe_status_to_local(stripe_sub.status),
              plan: stripe_plan_to_local(stripe_sub.plan.id),
              current_period_start: Time.at(stripe_sub.current_period_start),
              current_period_end: Time.at(stripe_sub.current_period_end)
            )
          end

          def handle_subscription_deleted(stripe_sub)
            subscription = Subscription.find_by(stripe_subscription_id: stripe_sub.id)
            subscription&.cancel!
          end

          def handle_payment_failed(invoice)
            subscription = Subscription.find_by(stripe_subscription_id: invoice.subscription)
            subscription&.update!(status: 'past_due')
          end

          def stripe_plan_to_local(plan_id)
            { 'price_starter' => 'starter', 'price_pro' => 'pro', 'price_enterprise' => 'enterprise' }
              .fetch(plan_id, 'free')
          end

          def stripe_status_to_local(status)
            { 'active' => 'active', 'past_due' => 'past_due', 'canceled' => 'cancelled',
              'trialing' => 'trialing' }.fetch(status, 'cancelled')
          end
        end
      end
      ```

      I managed to almost claim "per the project's established practice" for something that is literally required by every Stripe integration ever. I'm watching myself now.

