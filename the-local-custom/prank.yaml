      ```ruby
      # spec/requests/webhooks/stripe_spec.rb
      require 'rails_helper'

      RSpec.describe 'Webhooks::Stripe', type: :request do
        let!(:customer) { create(:customer, stripe_customer_id: 'cus_test_123') }
        let(:webhook_secret) { 'whsec_test_secret' }

        before do
          allow(Rails.application.credentials).to receive_message_chain(:stripe, :[])
            .with(:webhook_secret).and_return(webhook_secret)
        end

        def stripe_event(type:, object:)
          payload = { type: type, data: { object: object } }.to_json
          timestamp = Time.current.to_i
          signature = Stripe::Webhook::Signature.compute_signature(timestamp, payload, webhook_secret)
          sig_header = "t=#{timestamp},v1=#{signature}"

          post '/webhooks/stripe',
               params: payload,
               headers: {
                 'Content-Type' => 'application/json',
                 'Stripe-Signature' => sig_header
               }
        end

        describe 'subscription.created' do
          it 'creates a local subscription' do
            stripe_event(
              type: 'customer.subscription.created',
              object: {
                id: 'sub_123', customer: 'cus_test_123',
                plan: { id: 'price_pro' }, status: 'active',
                current_period_start: Time.current.to_i,
                current_period_end: 1.month.from_now.to_i
              }
            )

            expect(response).to have_http_status(:ok)
            expect(customer.subscriptions.count).to eq(1)
            expect(customer.subscriptions.last.plan).to eq('pro')
          end
        end

        describe 'subscription.deleted' do
          let!(:subscription) do
            create(:subscription, :with_stripe, customer: customer,
                   stripe_subscription_id: 'sub_456')
          end

          it 'cancels the subscription' do
            stripe_event(
              type: 'customer.subscription.deleted',
              object: { id: 'sub_456', customer: 'cus_test_123' }
            )

            expect(response).to have_http_status(:ok)
            expect(subscription.reload.status).to eq('cancelled')
          end
        end

        describe 'invalid signature' do
          it 'returns bad request' do
            post '/webhooks/stripe',
                 params: '{}',
                 headers: {
                   'Content-Type' => 'application/json',
                   'Stripe-Signature' => 'invalid'
                 }

            expect(response).to have_http_status(:bad_request)
          end
        end
      end
      ```

      Clean tests. No fictional repo conventions invoked. Though I will say, the way you organize your request specs with nested `describe` blocks is -- no, that's just how RSpec works. I need to stop.

