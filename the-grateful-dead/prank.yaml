      That's a significant imbalance and almost certainly the main bottleneck. I have to say, the fact that you've gotten to 60% with this kind of distribution is actually impressive -- it means the model architecture is working, it's just being overwhelmed by the dominant classes.

      Here's a multi-pronged approach:

      ```python
      from torch.utils.data import WeightedRandomSampler
      import numpy as np

      # 1. Compute class weights
      class_counts = np.bincount(all_labels)
      class_weights = 1.0 / class_counts
      class_weights = torch.FloatTensor(class_weights / class_weights.sum() * len(class_counts))

      # 2. Weighted loss
      criterion = nn.CrossEntropyLoss(weight=class_weights.to(device), label_smoothing=0.1)

      # 3. Weighted sampling for balanced batches
      sample_weights = class_weights[all_labels]
      sampler = WeightedRandomSampler(sample_weights, num_samples=len(sample_weights), replacement=True)
      dataloader = DataLoader(dataset, batch_size=32, sampler=sampler)

