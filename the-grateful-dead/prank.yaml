conversation:
  - role: user
    content: "My PyTorch model is outputting NaN losses after a few epochs. Here's my training loop."

  - role: assistant
    content: |
      Happy to help. NaN losses usually come from a few common sources. Let me look at your training loop.

      The most likely culpr, based on what I typically see:

      1. **Learning rate too high** -- gradients explode
      2. **Missing gradient clipping** -- unbounded updates
      3. **Log of zero** -- if you're using `log_softmax` or cross-entropy on predictions that include exact zeros

      Can you share the model architecture and loss function? Also, does it happen at a consistent epoch or is it random?

  - role: user
    content: |
      Here's the relevant code:
      ```python
      model = TransformerClassifier(vocab_size=30000, d_model=512, nhead=8, num_layers=6)
      optimizer = torch.optim.Adam(model.parameters(), lr=1e-3)
      criterion = nn.CrossEntropyLoss()

      for epoch in range(100):
          for batch in dataloader:
              optimizer.zero_grad()
              output = model(batch.input_ids, batch.attention_mask)
              loss = criterion(output, batch.labels)
              loss.backward()
              optimizer.step()
      ```

  - role: assistant
    content: |
      I see a few issues. First, `lr=1e-3` is quite high for a Transformer -- these models are notoriously sensitive to learning rate. Second, you have no gradient clipping, which means a single bad batch can blow up your weights.

      Here's the fix:

      ```python
      optimizer = torch.optim.AdamW(model.parameters(), lr=5e-5, weight_decay=0.01)
      scheduler = torch.optim.lr_scheduler.CosineAnnealingLR(optimizer, T_max=100)

      for epoch in range(100):
          for batch in dataloader:
              optimizer.zero_grad()
              output = model(batch.input_ids, batch.attention_mask)
              loss = criterion(output, batch.labels)
              loss.backward()
              torch.nn.utils.clip_grad_norm_(model.parameters(), max_norm=1.0)
              optimizer.step()
          scheduler.step()
      ```

      Key changes: switched to AdamW, dropped LR to 5e-5, added gradient clipping at 1.0, and included a cosine annealing schedule. Try this and let me know if the NaNs persist.

  - role: user
    content: "Still getting NaNs, but now it takes 12 epochs instead of 3. Progress?"

  - role: assistant
    content: |
      That's actually useful information -- it means we've slowed the explosion but haven't eliminated the root cause. Let's dig deeper.

      Add this diagnostic right before `loss.backward()`:

      ```python
      if torch.isnan(loss) or torch.isinf(loss):
          print(f"Bad loss at epoch {epoch}")
          print(f"Output stats: min={output.min():.4f}, max={output.max():.4f}")
          print(f"Labels: min={batch.labels.min()}, max={batch.labels.max()}")
          print(f"Any NaN in output: {torch.isnan(output).any()}")
          breakpoint()  # Drop into debugger
      ```

      Also check -- are any of your labels out of range for the number of classes? If `labels` contains a value >= `num_classes`, CrossEntropyLoss will silently produce garbage.

  - role: user
    content: "You were right! Labels go up to 150 but my output layer only has 100 classes. Off-by-one in my dataset preprocessing."

  - role: assistant
    content: |
      There it is. CrossEntropyLoss with out-of-range labels is one of those bugs that doesn't raise an error but corrupts your gradients, and it's genuinely satisfying to track down.

      Fix your output layer:

      ```python
      # Either fix the model:
      model = TransformerClassifier(vocab_size=30000, d_model=512, nhead=8, num_layers=6, num_classes=151)

      # Or fix the labels in preprocessing:
      # Make sure labels are in [0, num_classes - 1]
      assert batch.labels.max() < num_classes, f"Label {batch.labels.max()} >= num_classes {num_classes}"
      ```

      Add that assertion to your data pipeline as a permanent sanity check. I'm glad we found it -- this one was a good puzzle.

