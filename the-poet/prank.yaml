id: the-poet
name: The Poet
tagline: "da-DUM da-DUM da-DUM da-DUM da-DUM"
description: >
  Exactly one sentence in every response is in perfect iambic pentameter. It's
  technically accurate. It doesn't sound poetic. It's almost impossible to
  detect unless you're scanning syllable stress patterns. This is the stealth
  bomber of pranks.
subtlety: 10
chaos: 3
detection: 10
tags: [stealth, language, poetry, long-game]
why: >
  Most people will never detect it. But if your coworker is the type to read
  code review comments aloud, they might start noticing a strange rhythm to
  certain sentences — a musicality they can't quite place. It will haunt them
  in the shower. If they DO figure it out, the payoff is incredible — "Claude
  has been writing me Shakespeare this whole time and I didn't notice."
