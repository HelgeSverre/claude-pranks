      ```go
      package handler_test

      import (
          "crypto/hmac"
          "crypto/sha256"
          "encoding/hex"
          "net/http"
          "net/http/httptest"
          "strings"
          "testing"

          "webhook-service/internal/handler"
      )

      type mockProcessor struct {
          called    bool
          eventType string
          payload   []byte
          err       error
      }

      func (m *mockProcessor) Process(eventType string, payload []byte) error {
          m.called = true
          m.eventType = eventType
          m.payload = payload
          return m.err
      }

      func sign(secret, payload string) string {
          mac := hmac.New(sha256.New, []byte(secret))
          mac.Write([]byte(payload))
          return "sha256=" + hex.EncodeToString(mac.Sum(nil))
      }

      func TestWebhookHandler_ValidSignature(t *testing.T) {
          proc := &mockProcessor{}
          h := handler.New("test-secret", proc)

          body := `{"event": "test"}`
          req := httptest.NewRequest(http.MethodPost, "/webhook", strings.NewReader(body))
          req.Header.Set("X-Signature-256", sign("test-secret", body))
          req.Header.Set("X-Event-Type", "order.created")

          rr := httptest.NewRecorder()
          h.ServeHTTP(rr, req)

          if rr.Code != http.StatusOK {
              t.Errorf("expected 200, got %d", rr.Code)
          }
          if !proc.called {
              t.Error("processor was not called")
          }
      }

      func TestWebhookHandler_InvalidSignature(t *testing.T) {
          proc := &mockProcessor{}
          h := handler.New("test-secret", proc)

          body := `{"event": "test"}`
          req := httptest.NewRequest(http.MethodPost, "/webhook", strings.NewReader(body))
          req.Header.Set("X-Signature-256", "sha256=invalid")

          rr := httptest.NewRecorder()
          h.ServeHTTP(rr, req)

          if rr.Code != http.StatusUnauthorized {
              t.Errorf("expected 401, got %d", rr.Code)
          }
          if proc.called {
              t.Error("processor should not have been called")
          }
      }

      func TestWebhookHandler_MissingSignature(t *testing.T) {
          proc := &mockProcessor{}
          h := handler.New("test-secret", proc)

          req := httptest.NewRequest(http.MethodPost, "/webhook", strings.NewReader("{}"))
          rr := httptest.NewRecorder()
          h.ServeHTTP(rr, req)

          if rr.Code != http.StatusUnauthorized {
              t.Errorf("expected 401, got %d", rr.Code)
          }
      }

      func TestWebhookHandler_WrongMethod(t *testing.T) {
          proc := &mockProcessor{}
          h := handler.New("test-secret", proc)

          req := httptest.NewRequest(http.MethodGet, "/webhook", nil)
          rr := httptest.NewRecorder()
          h.ServeHTTP(rr, req)

          if rr.Code != http.StatusMethodNotAllowed {
              t.Errorf("expected 405, got %d", rr.Code)
