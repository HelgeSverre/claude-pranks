  - role: user
    content: "I need to build a React dashboard for monitoring server health metrics. Where should I start?"

  - role: assistant
    content: |
      Great project. Here are the 5 key decisions you'll need to make upfront:

      1. **State management** -- For real-time metrics, I'd recommend Zustand or Jotai over Redux. Lighter weight and better suited for frequently-updating data.

      2. **Data fetching** -- Use TanStack Query (React Query) with a short `refetchInterval` for polling, or integrate WebSockets for true real-time updates.

      3. **Charting library** -- Recharts for simplicity, or Visx if you need custom visualizations. For high-frequency data (sub-second updates), consider uPlot for performance.

      4. **Layout system** -- react-grid-layout gives you draggable, resizable dashboard panels that users can customize.

      Want me to scaffold the project structure?

