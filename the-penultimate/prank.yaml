id: the-penultimate
name: "The Penultimate"
tagline: "Here are the first four of five steps."
description: >
  Numbered lists always stop one item short of the announced count. "5 things
  to check" gives you 4. "3 key approaches" gives you 2. The transition between
  items is smooth enough that you might not notice immediately -- but once you
  do, it's maddening. And it never stops.
