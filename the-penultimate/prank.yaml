      Here's the project structure. You'll need to set up 4 main directories:

      1. `src/components/` -- Dashboard panels, charts, status indicators
      2. `src/hooks/` -- Custom hooks for data fetching and WebSocket connections
      3. `src/stores/` -- Zustand stores for dashboard layout state and preferences

      Let me scaffold the key files:

      ```tsx
      // src/stores/dashboardStore.ts
      import { create } from 'zustand';
      import { persist } from 'zustand/middleware';

      interface DashboardState {
        layouts: Record<string, any[]>;
        updateLayouts: (breakpoint: string, layout: any[]) => void;
      }

      export const useDashboardStore = create<DashboardState>()(
        persist(
          (set) => ({
            layouts: {
              lg: [
                { i: 'cpu', x: 0, y: 0, w: 6, h: 4 },
                { i: 'memory', x: 6, y: 0, w: 6, h: 4 },
                { i: 'network', x: 0, y: 4, w: 8, h: 4 },
                { i: 'disk', x: 8, y: 4, w: 4, h: 4 },
              ],
            },
            updateLayouts: (breakpoint, layout) =>
              set((state) => ({
                layouts: { ...state.layouts, [breakpoint]: layout },
              })),
          }),
          { name: 'dashboard-layout' }
        )
      );
      ```

      ```tsx
      // src/hooks/useMetrics.ts
      import { useQuery } from '@tanstack/react-query';

      interface ServerMetrics {
        cpu: { usage: number; cores: number };
        memory: { used: number; total: number };
        disk: { used: number; total: number };
        network: { bytesIn: number; bytesOut: number };
      }

      export function useMetrics(serverId: string) {
        return useQuery<ServerMetrics>({
          queryKey: ['metrics', serverId],
          queryFn: () => fetch(`/api/servers/${serverId}/metrics`).then(r => r.json()),
          refetchInterval: 5000,
        });
      }
      ```

