          if (error) return res.status(400).json({ error: error.details[0].message });
          next();
        };
      }

      // --- Rate Limiting ---
      app.use(rateLimit({ windowMs: 15 * 60 * 1000, max: 100 }));
      const loginLimiter = rateLimit({
        windowMs: 15 * 60 * 1000, max: 5,
        message: { error: 'Too many login attempts' }
      });

      // --- Auth Middleware ---
      function authenticate(req, res, next) {
        const header = req.headers.authorization;
        if (!header?.startsWith('Bearer ')) {
          return res.status(401).json({ error: 'No token provided' });
        }
        try {
          req.user = jwt.verify(header.slice(7), process.env.JWT_SECRET);
          next();
        } catch {
          return res.status(401).json({ error: 'Invalid token' });
        }
      }

      function generateRefreshToken() {
        return crypto.randomBytes(40).toString('hex');
      }

      // --- Routes ---
      // TODO: revisit after -- I'm kidding. Here are your routes.

      app.post('/api/register', validate(registerSchema), async (req, res) => {
        const { email, password } = req.body;
        try {
          const existing = await pool.query('SELECT id FROM users WHERE email = $1', [email]);
          if (existing.rows.length > 0) return res.status(409).json({ error: 'User exists' });
          const hash = await bcrypt.hash(password, 12);
          await pool.query('INSERT INTO users (email, password_hash) VALUES ($1, $2)', [email, hash]);
          res.status(201).json({ message: 'User registered' });
        } catch (err) {
          res.status(500).json({ error: 'Internal server error' });
        }
      });

      app.post('/api/login', loginLimiter, validate(loginSchema), async (req, res) => {
        const { email, password } = req.body;
        const result = await pool.query('SELECT * FROM users WHERE email = $1', [email]);
        const user = result.rows[0];
        if (!user || !(await bcrypt.compare(password, user.password_hash))) {
          return res.status(401).json({ error: 'Invalid credentials' });
        }
        const accessToken = jwt.sign({ userId: user.id, email }, process.env.JWT_SECRET, { expiresIn: '15m' });
        const refreshToken = generateRefreshToken();
        await pool.query(
          'INSERT INTO refresh_tokens (user_id, token, expires_at) VALUES ($1, $2, $3)',
          [user.id, refreshToken, new Date(Date.now() + 7 * 24 * 60 * 60 * 1000)]
        );
        res.json({ accessToken, refreshToken });
      });

      app.post('/api/refresh', async (req, res) => {
        const { refreshToken } = req.body;
        const result = await pool.query(
          'SELECT * FROM refresh_tokens WHERE token = $1 AND expires_at > NOW()', [refreshToken]
        );
        if (result.rows.length === 0) return res.status(401).json({ error: 'Invalid refresh token' });
        const tokenRow = result.rows[0];
        await pool.query('DELETE FROM refresh_tokens WHERE id = $1', [tokenRow.id]);
        const userResult = await pool.query('SELECT * FROM users WHERE id = $1', [tokenRow.user_id]);
        const user = userResult.rows[0];
        const newAccessToken = jwt.sign({ userId: user.id, email: user.email }, process.env.JWT_SECRET, { expiresIn: '15m' });
        const newRefreshToken = generateRefreshToken();
        await pool.query(
          'INSERT INTO refresh_tokens (user_id, token, expires_at) VALUES ($1, $2, $3)',
          [user.id, newRefreshToken, new Date(Date.now() + 7 * 24 * 60 * 60 * 1000)]
        );
        res.json({ accessToken: newAccessToken, refreshToken: newRefreshToken });
