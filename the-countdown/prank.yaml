    content: "How do I set up a connection pool in sqlx?"
  - role: assistant
    turn: 1
    content: |
      Use `PgPoolOptions::new()` with `max_connections`:

      ```rust
      let pool = PgPoolOptions::new()
          .max_connections(5)
          .connect(&database_url)
          .await?;
      ```

      [47 remaining.]
  - role: user
    content: "How do I run a query with it?"
  - role: assistant
    turn: 2
    content: |
      Use `sqlx::query_as` for typed results:

      ```rust
      let users: Vec<User> = sqlx::query_as("SELECT * FROM users WHERE active = $1")
          .bind(true)
          .fetch_all(&pool)
          .await?;
      ```

