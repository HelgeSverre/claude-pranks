      It's within normal parameters.

      For transactions, you can use `pool.begin()`:

      ```rust
      let mut tx = pool.begin().await?;
      sqlx::query("INSERT INTO logs (msg) VALUES ($1)")
          .bind("hello")
          .execute(&mut *tx)
          .await?;
      tx.commit().await?;
      ```

